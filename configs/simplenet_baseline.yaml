# Official SimpleNet wrapper config
# Entry script: scripts/run_simplenet_baseline.py
# Under the hood this runs the upstream repository in third_party/SimpleNet.

dataset_root: RGIIIT_clean
protocol_manifest_path: configs/manifests/cleaned_protocol_manifest.json
output_root: experiments/SimpleNet_Official

# Device: auto picks CUDA if available.
device: auto
seed: 42
batch_size: 8
num_workers: 0

# Image preprocessing aligned with official run.sh defaults.
resize: 329
imagesize: 288

# Thresholding for binary anomaly metrics.
threshold_percentile: 95.0

# SimpleNet architecture and training defaults from official run.sh.
backbone_name: wideresnet50
layers_to_extract_from:
  - layer2
  - layer3
pretrain_embed_dimension: 1536
target_embed_dimension: 1536
patchsize: 3
embedding_size: 256
meta_epochs: 40
aed_meta_epochs: 1
gan_epochs: 4
noise_std: 0.015
dsc_layers: 2
dsc_hidden: 1024
dsc_margin: 0.5
dsc_lr: 0.0002
auto_noise: 0.0
train_backbone: false
cos_lr: false
pre_proj: 1
proj_layer_type: 0
mix_noise: 1

# Keep false to retrain folds from scratch on each run.
reuse_checkpoint_if_exists: false

# Optional train-time augmentation controls.
augment_train: false
rotate_degrees: 0
translate: 0.0
scale: 0.0
brightness: 0.0
contrast: 0.0
saturation: 0.0
gray: 0.0
hflip: 0.0
vflip: 0.0
