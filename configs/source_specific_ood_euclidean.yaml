# Source-Specific One-Class OOD (Euclidean)
# 8-model phase: 4 domains x 2 geometries (this file = Euclidean)

dataset_path: "RGIIIT_clean"
clip_model_name: "openai/clip-vit-base-patch16"

domains:
  - "Real"
  - "GAN"
  - "LDM"
  - "MLS"

batch_size: 32
epochs: 25
# Fixed budget across domains (Task 8): each run executes this many optimizer steps.
target_total_steps: 700
learning_rate: 1.0e-5
weight_decay: 1.0e-4
num_workers: 0

projection_dim: 256

# Default threshold uses in-domain validation score percentile
threshold_percentile: 95

# "calibrated_f1" recommended for fair operating point;
# "default_percentile" keeps pure fixed-threshold policy.
threshold_mode: "calibrated_f1"

# Task 5 update: enforce generator-balanced fake composition for val/test.
# Options: proportional, generator_balanced_strict, generator_balanced_with_replacement
eval_fake_sampling_policy: "generator_balanced_strict"

experiment_dir: "experiments/source_specific_ood_euclidean_reruns"
seed: 42
