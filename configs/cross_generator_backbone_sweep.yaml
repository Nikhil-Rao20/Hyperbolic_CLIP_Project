# Cross-Generator × Backbone Sweep
# ==================================
# Train on ONE synthetic generator + all real, test on UNSEEN generators + all real.
# Sweep across multiple CLIP (ViT) and ResNet backbones.

# Dataset
dataset_path: "RGIIIT_clean"

# Generator groups for cross-generator splits
# Each group is trained in isolation; others become the test fakes.
generator_groups:
  GAN:
    - "GAN"
  LDM:
    - "LDM"
  MLS:
    - "MLS_CERMEP"
    - "MLS_TCGA"
    - "MLS_UPenn"

real_sources:
  - "cermep"
  - "tcga"
  - "upenn"

# Backbones to sweep
# type: "clip" → contrastive fine-tuning via HuggingFace CLIPModel
# type: "resnet" → binary BCEWithLogitsLoss classifier via torchvision
backbones:
  - name: "ViT-B-32"
    type: "clip"
    model_id: "openai/clip-vit-base-patch32"

  - name: "ViT-B-16"
    type: "clip"
    model_id: "openai/clip-vit-base-patch16"

  - name: "ViT-L-14"
    type: "clip"
    model_id: "openai/clip-vit-large-patch14"

  - name: "ResNet50"
    type: "resnet"
    model_id: "resnet50"

  - name: "ResNet101"
    type: "resnet"
    model_id: "resnet101"

# CLIP contrastive training hyperparameters
clip_training:
  batch_size: 32
  epochs: 25
  lr_image: 1.0e-5
  lr_text: 1.0e-5
  lr_projection: 1.0e-4
  weight_decay: 1.0e-4

# ResNet binary classification hyperparameters
resnet_training:
  batch_size: 32
  epochs: 25
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4

# Common
num_workers: 0          # set to 2-4 on Kaggle/Linux
experiment_dir: "experiments/cross_generator_sweep"
seed: 42
