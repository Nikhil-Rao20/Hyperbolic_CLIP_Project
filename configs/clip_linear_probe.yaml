# CLIP Linear Probe — Frozen CLIP + Trainable Linear Head
# ========================================================

# Dataset
dataset_path: "RGIIIT_clean"

# CLIP model (HuggingFace)
clip_model_name: "openai/clip-vit-base-patch32"

# Training hyperparameters
batch_size: 64
epochs: 25
learning_rate: 1.0e-3
weight_decay: 1.0e-4
optimizer: "AdamW"
num_workers: 0          # set to 2-4 on Kaggle/Linux

# Output
experiment_dir: "experiments/clip_linear_probe"
