# Cross-Generator Generalization Experiment — ResNet50
# =====================================================

# Dataset
dataset_path: "RGIIIT_clean"

# Training hyperparameters (per fold)
batch_size: 32
epochs: 25
learning_rate: 3.0e-4
weight_decay: 1.0e-4
optimizer: "AdamW"
num_workers: 0          # set to 2-4 on Kaggle/Linux

# Synthetic generators to evaluate (leave-one-out)
synthetic_generators:
  - "GAN"
  - "LDM"
  - "MLS_CERMEP"
  - "MLS_TCGA"
  - "MLS_UPenn"

# Experiment output
experiment_dir: "experiments/resnet_cross_generator"
