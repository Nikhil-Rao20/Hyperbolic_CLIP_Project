dataset_root: RGIIIT_clean
manifest_path: experiments_version2/one_class_svdd_clip_v1_kaggle/experiments_version2/protocol_manifest.json

output_root: experiments_frozen_protocol
run_name: frozen_pretrained_cleaned_protocol

batch_size: 16
threshold_percentile: 95
curvature: 1.0
scale: 0.1

# Used only for InstructBLIP preprocessing path
instruct_prompt: "Is this brain MRI slice real or synthetic?"

geometries:
  - euclidean
  - hyperbolic

models:
  - name: clip_vit_b32
    type: clip
    model_id: openai/clip-vit-base-patch32

  - name: clip_vit_b16
    type: clip
    model_id: openai/clip-vit-base-patch16

  - name: clip_rn101
    type: clip
    model_id: openai/clip-rn101

  - name: instructblip
    type: instructblip
    model_id: Salesforce/instructblip-flan-t5-base
